name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version
          cargo --version

      - name: Run SwiftPM tests
        run: make test

      - name: Run Rust sidecar tests
        run: make rust-test

      - name: Run Xcode tests
        run: make xcode-test

      - name: Build release app
        run: make package-release

      - name: Upload release app artifact
        uses: actions/upload-artifact@v7
        with:
          name: StockMonitorNative-macos-release
          path: .build/StockMonitorNative-Release.zip
          if-no-files-found: error
